name: MessageVault
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
targets:
  MessageVault:
    type: application
    platform: macOS
    sources: [Sources/MessageVault]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scottphillips.MessageVault
        PRODUCT_NAME: MessageVault
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/MessageVault/MessageVault.entitlements
        INFOPLIST_FILE: Sources/MessageVault/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - sdk: libsqlite3.tbd
  MessageVaultTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/MessageVaultTests]
    dependencies:
      - target: MessageVault
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MessageVault.app/Contents/MacOS/MessageVault"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  MessageVault:
    build:
      targets:
        MessageVault: all
        MessageVaultTests: [test]
    test:
      targets: [MessageVaultTests]
